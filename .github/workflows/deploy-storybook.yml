name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ui-kit/**'
      - '.github/workflows/deploy-storybook.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-kit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ui-kit/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: yarn build-storybook --output-dir ../storybook-out

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
